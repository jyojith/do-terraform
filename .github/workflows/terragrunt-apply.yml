# Runs terragrunt apply only when a deploy tag is pushed (see scripts/tag-deploy.sh).
name: Terragrunt apply

on:
  push:
    tags:
      - "deploy/**"

permissions:
  contents: read

env:
  TG_VERSION: "0.67.16"
  TF_VERSION: "1.9.0"

jobs:
  apply:
    name: Terragrunt apply (environments/dev)
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash

    steps:
      # Inline (not ci-checkout.sh): first step has no repo yet, so script file is missing.
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          cd "${GITHUB_WORKSPACE}"
          git clone "${REPO_URL}" .
          git checkout "${GITHUB_SHA}"

      - name: Verify tag points to a commit on main
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Refusing apply: tagged commit is not an ancestor of origin/main."
            exit 1
          fi
          echo "Tagged commit ${GITHUB_SHA} is on main — proceeding."

      - name: Install Terraform
        env:
          TF_VERSION: ${{ env.TF_VERSION }}
        run: bash .github/scripts/ci-install-terraform.sh

      - name: Install Terragrunt
        run: |
          curl -fsSL -o /tmp/terragrunt \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x /tmp/terragrunt
          sudo mv /tmp/terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: Import existing DOKS cluster into state (if present)
        working-directory: environments/dev/doks
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          TG_STATE_BUCKET: ${{ secrets.TG_STATE_BUCKET }}
          TG_STATE_REGION: ${{ secrets.TG_STATE_REGION }}
          TG_STATE_ENDPOINT: ${{ secrets.TG_STATE_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TG_STATE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TG_STATE_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail

          CLUSTER_NAME="$(awk -F'=' '/^[[:space:]]*name[[:space:]]*=/{val=$2; gsub(/"/,"",val); gsub(/[[:space:]]/,"",val); print val; exit}' ../env.hcl)"
          if [[ -z "${CLUSTER_NAME}" ]]; then
            echo "Could not find cluster name in environments/dev/env.hcl"
            exit 1
          fi

          CLUSTER_ID="$(
            CLUSTER_NAME="${CLUSTER_NAME}" curl -fsSL \
              -H "Authorization: Bearer ${DO_TOKEN}" \
              "https://api.digitalocean.com/v2/kubernetes/clusters" \
            | CLUSTER_NAME="${CLUSTER_NAME}" python3 -c 'import json,os,sys; target=os.environ["CLUSTER_NAME"]; data=json.load(sys.stdin); print(next((c.get("id","") for c in data.get("kubernetes_clusters",[]) if c.get("name")==target), ""))'
          )"

          if [[ -n "${CLUSTER_ID}" ]]; then
            echo "Found existing cluster ${CLUSTER_NAME} (${CLUSTER_ID}); importing into state."
            terragrunt import -input=false module.cluster.digitalocean_kubernetes_cluster.main "${CLUSTER_ID}" || true
          else
            echo "No existing cluster named ${CLUSTER_NAME}; apply will create it."
          fi

      - name: Import existing Traefik resources into state (if present)
        working-directory: environments/dev/traefik
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          TG_STATE_BUCKET: ${{ secrets.TG_STATE_BUCKET }}
          TG_STATE_REGION: ${{ secrets.TG_STATE_REGION }}
          TG_STATE_ENDPOINT: ${{ secrets.TG_STATE_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TG_STATE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TG_STATE_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          terragrunt import -input=false module.traefik.kubernetes_namespace_v1.traefik traefik || true
          terragrunt import -input=false module.traefik.kubernetes_secret_v1.do_dns traefik/traefik-do-dns || true
          terragrunt import -input=false module.traefik.helm_release.traefik traefik/traefik || true

      - name: Terragrunt run-all apply
        working-directory: environments/dev
        env:
          TG_NON_INTERACTIVE: "true"
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          TF_VAR_argocd_admin_password_hash: ${{ secrets.ARGOCD_ADMIN_PASSWORD_HASH }}
          TG_STATE_BUCKET: ${{ secrets.TG_STATE_BUCKET }}
          TG_STATE_REGION: ${{ secrets.TG_STATE_REGION }}
          TG_STATE_ENDPOINT: ${{ secrets.TG_STATE_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TG_STATE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TG_STATE_SECRET_ACCESS_KEY }}
        run: terragrunt run-all apply --terragrunt-non-interactive -input=false -auto-approve
