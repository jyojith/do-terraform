# Runs terragrunt apply only when a deploy tag is pushed (see scripts/tag-deploy.sh).
name: Terragrunt apply

on:
  push:
    tags:
      - "deploy/**"

permissions:
  contents: read

env:
  TG_VERSION: "0.77.7"
  TF_VERSION: "1.9.0"
  TG_STATE_REGION_DEFAULT: "fra1"

jobs:
  apply:
    name: Terragrunt apply (environments/dev)
    runs-on: ubuntu-latest
    environment: production

    # S3/Spaces remote state: Terragrunt needs AWS env vars in every step that runs tofu (including doks in run-all).
    # Support either naming convention (env AWS_* or legacy TG_STATE_*).
    # No session token: DO Spaces keys are static; a stray session token would break signing.
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || secrets.TG_STATE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY || secrets.TG_STATE_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ""
      AWS_EC2_METADATA_DISABLED: "true"

    defaults:
      run:
        shell: bash

    steps:
      # Inline (not ci-checkout.sh): first step has no repo yet, so script file is missing.
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          cd "${GITHUB_WORKSPACE}"
          git clone "${REPO_URL}" .
          git checkout "${GITHUB_SHA}"

      - name: Verify tag points to a commit on main
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Refusing apply: tagged commit is not an ancestor of origin/main."
            exit 1
          fi
          echo "Tagged commit ${GITHUB_SHA} is on main — proceeding."

      - name: Install Terraform
        env:
          TF_VERSION: ${{ env.TF_VERSION }}
        run: bash .github/scripts/ci-install-terraform.sh

      - name: Install Terragrunt
        run: |
          curl -fsSL -o /tmp/terragrunt \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x /tmp/terragrunt
          sudo mv /tmp/terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: Verify Spaces / S3 state credentials
        env:
          TG_STATE_BUCKET: ${{ vars.TG_STATE_BUCKET }}
          TG_STATE_ENDPOINT: ${{ vars.TG_STATE_ENDPOINT }}
        run: |
          set -euo pipefail
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "Missing AWS credentials for remote state. Add repository or environment secrets:"
            echo "  AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY"
            echo "  (or as fallback: TG_STATE_ACCESS_KEY_ID / TG_STATE_SECRET_ACCESS_KEY)"
            exit 1
          fi
          echo "AWS credentials for remote state are set (length: ${#AWS_ACCESS_KEY_ID} / ${#AWS_SECRET_ACCESS_KEY})"
          if [ -n "${TG_STATE_BUCKET:-}" ] && [ -z "${TG_STATE_ENDPOINT:-}" ]; then
            echo "TG_STATE_BUCKET is set but TG_STATE_ENDPOINT is empty."
            echo "Set environment variable TG_STATE_ENDPOINT (e.g. https://fra1.digitaloceanspaces.com) on the production environment."
            exit 1
          fi
          if [ -n "${TG_STATE_ENDPOINT:-}" ]; then
            echo "Remote state: bucket=${TG_STATE_BUCKET:-<unset>}, endpoint (host only): ${TG_STATE_ENDPOINT#*://}"
          fi

      - name: Verify DigitalOcean API token (DOKS / ACME, not Spaces keys)
        env:
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DO_TOKEN:-}" ]; then
            echo "DO_TOKEN is empty. Set the production environment secret to a v2 personal access token (dop_v1_...)."
            exit 1
          fi
          code="$(curl -sS -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${DO_TOKEN}" https://api.digitalocean.com/v2/account)"
          if [ "${code}" != "200" ]; then
            echo "DigitalOcean API returned HTTP ${code} for GET /v2/account (expected 200)."
            echo "Use a personal access token from https://cloud.digitalocean.com/account/api/tokens for DO_TOKEN / TF_VAR_do_token."
            echo "Do not use Spaces (S3) access keys; they authenticate a different API and yield 401 for Domains/ACME."
            exit 1
          fi
          echo "DO_TOKEN is valid for the DigitalOcean API (HTTP 200 on /v2/account)."

      - name: Import existing DOKS cluster into state (if present)
        working-directory: environments/dev/doks
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          TG_STATE_BUCKET: ${{ vars.TG_STATE_BUCKET }}
          TG_STATE_REGION: ${{ vars.TG_STATE_REGION || env.TG_STATE_REGION_DEFAULT }}
          TG_STATE_ENDPOINT: ${{ vars.TG_STATE_ENDPOINT }}
        run: |
          set -euo pipefail

          CLUSTER_NAME="$(awk -F'=' '/^[[:space:]]*name[[:space:]]*=/{val=$2; gsub(/"/,"",val); gsub(/[[:space:]]/,"",val); print val; exit}' ../env.hcl)"
          if [[ -z "${CLUSTER_NAME}" ]]; then
            echo "Could not find cluster name in environments/dev/env.hcl"
            exit 1
          fi

          CLUSTER_ID="$(
            CLUSTER_NAME="${CLUSTER_NAME}" curl -fsSL \
              -H "Authorization: Bearer ${DO_TOKEN}" \
              "https://api.digitalocean.com/v2/kubernetes/clusters" \
            | CLUSTER_NAME="${CLUSTER_NAME}" python3 -c 'import json,os,sys; target=os.environ["CLUSTER_NAME"]; data=json.load(sys.stdin); print(next((c.get("id","") for c in data.get("kubernetes_clusters",[]) if c.get("name")==target), ""))'
          )"

          if [[ -n "${CLUSTER_ID}" ]]; then
            echo "Found existing cluster ${CLUSTER_NAME} (${CLUSTER_ID}); importing into state."
            terragrunt import -input=false module.cluster.digitalocean_kubernetes_cluster.main "${CLUSTER_ID}" || true
          else
            echo "No existing cluster named ${CLUSTER_NAME}; apply will create it."
          fi

      - name: Import existing Traefik resources into state (if present)
        working-directory: environments/dev/traefik
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          TG_STATE_BUCKET: ${{ vars.TG_STATE_BUCKET }}
          TG_STATE_REGION: ${{ vars.TG_STATE_REGION || env.TG_STATE_REGION_DEFAULT }}
          TG_STATE_ENDPOINT: ${{ vars.TG_STATE_ENDPOINT }}
        run: |
          set -euo pipefail
          terragrunt import -input=false module.traefik.kubernetes_namespace_v1.traefik traefik || true
          terragrunt import -input=false module.traefik.kubernetes_secret_v1.do_dns traefik/traefik-do-dns || true
          terragrunt import -input=false module.traefik.helm_release.traefik traefik/traefik || true

      - name: Terragrunt run-all init
        working-directory: environments/dev
        env:
          TG_NON_INTERACTIVE: "true"
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          TG_STATE_BUCKET: ${{ vars.TG_STATE_BUCKET }}
          TG_STATE_REGION: ${{ vars.TG_STATE_REGION || env.TG_STATE_REGION_DEFAULT }}
          TG_STATE_ENDPOINT: ${{ vars.TG_STATE_ENDPOINT }}
        run: terragrunt run-all init -reconfigure -input=false --terragrunt-non-interactive

      - name: Terragrunt run-all apply
        working-directory: environments/dev
        env:
          TG_NON_INTERACTIVE: "true"
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          TF_VAR_argocd_admin_password_hash: ${{ secrets.ARGOCD_ADMIN_PASSWORD_HASH }}
          TG_STATE_BUCKET: ${{ vars.TG_STATE_BUCKET }}
          TG_STATE_REGION: ${{ vars.TG_STATE_REGION || env.TG_STATE_REGION_DEFAULT }}
          TG_STATE_ENDPOINT: ${{ vars.TG_STATE_ENDPOINT }}
        run: terragrunt run-all apply --terragrunt-non-interactive -input=false -auto-approve
