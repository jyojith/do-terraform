# Runs terragrunt apply only when a deploy tag is pushed (see scripts/tag-deploy.sh).
name: Terragrunt apply

on:
  push:
    tags:
      - "deploy/**"

permissions:
  contents: read

env:
  TG_VERSION: "0.67.16"
  TF_VERSION: "1.9.0"

jobs:
  apply:
    name: Terragrunt apply (environments/dev)
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash

    steps:
      # Inline (not ci-checkout.sh): first step has no repo yet, so script file is missing.
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          cd "${GITHUB_WORKSPACE}"
          git clone "${REPO_URL}" .
          git checkout "${GITHUB_SHA}"

      - name: Verify tag points to a commit on main
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Refusing apply: tagged commit is not an ancestor of origin/main."
            exit 1
          fi
          echo "Tagged commit ${GITHUB_SHA} is on main — proceeding."

      - name: Install Terraform
        env:
          TF_VERSION: ${{ env.TF_VERSION }}
        run: bash .github/scripts/ci-install-terraform.sh

      - name: Install Terragrunt
        run: |
          curl -fsSL -o /tmp/terragrunt \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x /tmp/terragrunt
          sudo mv /tmp/terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: Import existing DOKS cluster into state (if present)
        working-directory: environments/dev/doks
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
        run: |
          set -euo pipefail

          CLUSTER_NAME="$(python3 - <<'PY'
import re
from pathlib import Path

text = Path("../env.hcl").read_text()
m = re.search(r'^\s*name\s*=\s*"([^"]+)"', text, re.MULTILINE)
if not m:
    raise SystemExit("Could not find cluster name in environments/dev/env.hcl")
print(m.group(1))
PY
)"

          CLUSTER_ID="$(CLUSTER_NAME="${CLUSTER_NAME}" python3 - <<'PY'
import json
import os
import urllib.request

token = os.environ["DO_TOKEN"]
req = urllib.request.Request(
    "https://api.digitalocean.com/v2/kubernetes/clusters",
    headers={"Authorization": f"Bearer {token}"},
)
with urllib.request.urlopen(req) as resp:
    data = json.load(resp)

target = os.environ["CLUSTER_NAME"]
for c in data.get("kubernetes_clusters", []):
    if c.get("name") == target:
        print(c.get("id", ""))
        break
else:
    print("")
PY
)"

          if [[ -n "${CLUSTER_ID}" ]]; then
            echo "Found existing cluster ${CLUSTER_NAME} (${CLUSTER_ID}); importing into state."
            terragrunt import -input=false module.cluster.digitalocean_kubernetes_cluster.main "${CLUSTER_ID}" || true
          else
            echo "No existing cluster named ${CLUSTER_NAME}; apply will create it."
          fi

      - name: Terragrunt run-all apply
        working-directory: environments/dev
        env:
          TG_NON_INTERACTIVE: "true"
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          TF_VAR_argocd_admin_password_hash: ${{ secrets.ARGOCD_ADMIN_PASSWORD_HASH }}
        run: terragrunt run-all apply --terragrunt-non-interactive -input=false -auto-approve
