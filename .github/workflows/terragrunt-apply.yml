# Runs terragrunt apply only when a deploy tag is pushed (see scripts/tag-deploy.sh).
name: Terragrunt apply

on:
  push:
    tags:
      - "deploy/**"

permissions:
  contents: read

env:
  TG_VERSION: "0.67.16"
  TF_VERSION: "1.9.0"

jobs:
  apply:
    name: Terragrunt apply (environments/dev)
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash

    steps:
      # Inline (not ci-checkout.sh): first step has no repo yet, so script file is missing.
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          cd "${GITHUB_WORKSPACE}"
          git clone "${REPO_URL}" .
          git checkout "${GITHUB_SHA}"

      - name: Verify tag points to a commit on main
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Refusing apply: tagged commit is not an ancestor of origin/main."
            exit 1
          fi
          echo "Tagged commit ${GITHUB_SHA} is on main — proceeding."

      - name: Install Terraform
        env:
          TF_VERSION: ${{ env.TF_VERSION }}
        run: bash .github/scripts/ci-install-terraform.sh

      - name: Install Terragrunt
        run: |
          curl -fsSL -o /tmp/terragrunt \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x /tmp/terragrunt
          sudo mv /tmp/terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terragrunt run-all apply
        working-directory: environments/dev
        env:
          TG_NON_INTERACTIVE: "true"
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          TF_VAR_argocd_admin_password_hash: ${{ secrets.ARGOCD_ADMIN_PASSWORD_HASH }}
        run: terragrunt --non-interactive run-all apply -input=false -auto-approve
