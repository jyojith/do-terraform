# Runs on every branch push; also on pull_request so fork PRs get the same checks.
name: Format and validate

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  TG_VERSION: "0.67.16"
  TF_VERSION: "1.9.0"

jobs:
  fmt-validate:
    name: fmt + terragrunt validate
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
        run: bash .github/scripts/ci-checkout.sh shallow

      - name: Install Terraform
        env:
          TF_VERSION: ${{ env.TF_VERSION }}
        run: bash .github/scripts/ci-install-terraform.sh

      - name: Install Terragrunt
        run: |
          curl -fsSL -o /tmp/terragrunt \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x /tmp/terragrunt
          sudo mv /tmp/terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terraform fmt
        run: terraform fmt -check -recursive modules terraform

      - name: Terragrunt hclfmt
        run: terragrunt hclfmt --check --working-dir=environments/dev

      - name: Terragrunt run-all validate
        working-directory: environments/dev
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          TF_VAR_argocd_admin_password_hash: ${{ secrets.ARGOCD_ADMIN_PASSWORD_HASH }}
        run: terragrunt run-all validate --non-interactive
