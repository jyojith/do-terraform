name: Terragrunt

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  TG_VERSION: "0.67.16"
  TF_VERSION: "1.9.0"

jobs:
  terragrunt:
    name: Terragrunt (environments/dev)
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash

    steps:
      # Inline (not ci-checkout.sh): first step has no repo yet, so script file is missing.
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          cd "${GITHUB_WORKSPACE}"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            if [ -z "${PR_NUMBER:-}" ]; then
              echo "PR_NUMBER is required for pull_request events" >&2
              exit 1
            fi
            git init -q
            git remote add origin "${REPO_URL}"
            git fetch --depth=1 origin "refs/pull/${PR_NUMBER}/merge"
            git checkout --detach FETCH_HEAD
          else
            git init -q
            git remote add origin "${REPO_URL}"
            git fetch --depth=1 origin "${GITHUB_SHA}"
            git checkout --detach FETCH_HEAD
          fi

      - name: Install Terraform
        env:
          TF_VERSION: ${{ env.TF_VERSION }}
        run: bash .github/scripts/ci-install-terraform.sh

      - name: Install Terragrunt
        run: |
          curl -fsSL -o /tmp/terragrunt \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x /tmp/terragrunt
          sudo mv /tmp/terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terragrunt run-all plan
        working-directory: environments/dev
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          TF_VAR_argocd_admin_password_hash: ${{ secrets.ARGOCD_ADMIN_PASSWORD_HASH }}
        run: terragrunt run-all plan --non-interactive -input=false
