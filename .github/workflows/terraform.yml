name: Terragrunt

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  TG_VERSION: "0.67.16"
  TF_VERSION: "1.9.0"

jobs:
  terragrunt:
    name: Terragrunt (live/dev)
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -fsSL -o /tmp/terragrunt \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x /tmp/terragrunt
          sudo mv /tmp/terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terraform fmt
        run: terraform fmt -check -recursive modules terraform

      - name: Terragrunt hclfmt
        run: terragrunt hclfmt --check --working-dir=live/dev

      - name: Terragrunt run-all validate
        working-directory: live/dev
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          TF_VAR_argocd_admin_password_hash: ${{ secrets.ARGOCD_ADMIN_PASSWORD_HASH }}
        run: terragrunt run-all validate --non-interactive

      - name: Terragrunt run-all plan
        working-directory: live/dev
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          TF_VAR_argocd_admin_password_hash: ${{ secrets.ARGOCD_ADMIN_PASSWORD_HASH }}
        run: terragrunt run-all plan --non-interactive -input=false

      - name: Terragrunt run-all apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: live/dev
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          TF_VAR_argocd_admin_password_hash: ${{ secrets.ARGOCD_ADMIN_PASSWORD_HASH }}
        run: terragrunt run-all apply --non-interactive -input=false -auto-approve
