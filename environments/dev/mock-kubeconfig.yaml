# Placeholder kubeconfig for terragrunt plan/validate when ./doks has not been applied yet (no kubeconfig output).
# Valid PEM in certificate-authority-data so the kubernetes provider accepts it. Replace implicitly after doks apply.
apiVersion: v1
kind: Config
preferences: {}
clusters:
  - name: mock-cluster
    cluster:
      certificate-authority-data: 
      server: https://127.0.0.1:6443
users:
  - name: mock-user
    user:
      token: mock
contexts:
  - name: mock-context
    context:
      cluster: mock-cluster
      user: mock-user
current-context: mock-context
